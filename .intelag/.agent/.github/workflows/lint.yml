name: instruction-kit-lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check frontmatter
        run: python scripts/check_frontmatter.py
      - name: Check rule IDs
        run: python scripts/check_rule_ids.py
      - name: Check citation artifacts
        run: python scripts/check_citation_artifacts.py
      - name: Build ID index
        run: python scripts/build_id_index.py
      - name: Check persona token budget
        run: python scripts/check_persona_token_budget.py
