    renames:
      BaseConfigMerger: ConfigMergeMixin
  - old_rel_file: intelag_config_model/config_model/modules/config_serializer_mixin.py
    renames:
      BaseConfigSerializer: ConfigSerializerMixin
  - old_rel_file: intelag_config_model/config_model/modules/config_yaml_ops_mixin.py
    renames:
      YamlConfigHandler: ConfigYamlOpsMixin
  - old_rel_file: intelag_config_model/db_manager/sync_manager.py
    renames:
      SyncManager: BaseSyncManager
